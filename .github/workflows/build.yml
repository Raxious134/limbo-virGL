name: Android16-VirGL-Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Instead of using gradlew, we install Gradle 8.5 directly
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build APK
        run: |
          # We use 'gradle' directly instead of './gradlew'
          gradle assembleDebug --stacktrace
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Limbo-A16-Fixed
          path: "**/*.apk"
