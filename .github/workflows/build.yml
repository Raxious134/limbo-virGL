name: Android16-VirGL-Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: |
          # Try to build from root or subfolder
          chmod +x gradlew || chmod +x app/gradlew
          ./gradlew assembleDebug || ./app/gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Limbo-A16-Fixed
          path: "**/*.apk"
